# fly.toml app configuration file generated for suno-dl-kr on 2026-03-02T20:42:23+09:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'suno-dl-kr'
primary_region = 'nrt'

[env]
  PORT = '8080'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
