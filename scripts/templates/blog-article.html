<!DOCTYPE html>
<html lang="{{LANG}}">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>{{TITLE}} — SunoDown Blog</title>
    <meta name="description" content="{{SUMMARY}}" />
    <link rel="canonical" href="{{CANONICAL_URL}}" />

    <link rel="alternate" hreflang="en" href="{{HREFLANG_EN}}" />
    <link rel="alternate" hreflang="ko" href="{{HREFLANG_KO}}" />
    <link rel="alternate" hreflang="x-default" href="{{HREFLANG_EN}}" />

    <meta property="og:type" content="article" />
    <meta property="og:title" content="{{TITLE}}" />
    <meta property="og:description" content="{{SUMMARY}}" />
    <meta property="og:url" content="{{CANONICAL_URL}}" />
    <meta property="og:site_name" content="SunoDown" />
    <meta property="og:image" content="{{OG_IMAGE}}" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="{{TITLE}}" />
    <meta property="og:locale" content="{{OG_LOCALE}}" />
    <meta property="og:locale:alternate" content="{{OG_LOCALE_ALT}}" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="{{TITLE}}" />
    <meta name="twitter:description" content="{{SUMMARY}}" />
    <meta name="twitter:image" content="{{OG_IMAGE}}" />
    <meta name="twitter:image:alt" content="{{TITLE}}" />

    <meta name="theme-color" content="#0a0a12" />
    <meta name="robots" content="index, follow, max-snippet:-1, max-image-preview:large" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet" />

    <script type="application/ld+json">
    {{STRUCTURED_DATA_ARTICLE}}
    </script>

    <script type="application/ld+json">
    {{STRUCTURED_DATA_BREADCRUMB}}
    </script>

    <style>
      :root {
        --bg: #08080f;
        --bg-card: #111119;
        --border: #242430;
        --text: #ededf5;
        --text-soft: #c0c0d0;
        --text-mute: #6b6b80;
        --acc1: #c084fc;
        --acc2: #22d3ee;
        --acc3: #8b5cf6;
      }
      * { box-sizing: border-box; }
      html, body { background: var(--bg); margin: 0; padding: 0; }
      body {
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        color: var(--text);
        line-height: 1.65;
        -webkit-font-smoothing: antialiased;
      }
      .wrap { max-width: 820px; margin: 0 auto; padding: 0 18px; }

      header {
        background: var(--bg-card);
        border-bottom: 1px solid var(--border);
        padding: 14px 0;
      }
      .header-inner {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }
      .logo {
        font-weight: 900;
        font-size: 1.4rem;
        letter-spacing: -0.03em;
        color: var(--acc1);
        text-decoration: none;
      }
      .logo-dot { color: var(--acc2); }
      .pill {
        background: var(--acc3);
        color: #fff;
        padding: 2px 8px;
        border-radius: 99px;
        font-size: 0.65rem;
        font-weight: 700;
        vertical-align: 2px;
        margin-left: 4px;
      }
      .header-right { display: flex; align-items: center; gap: 14px; }
      .lang-switch {
        display: flex;
        gap: 8px;
        font-size: 13px;
      }
      .lang-switch a {
        color: var(--text-mute);
        text-decoration: none;
        padding: 4px 8px;
        border-radius: 6px;
        border: 1px solid transparent;
      }
      .lang-switch a:hover { color: var(--acc2); border-color: var(--border); }
      .lang-switch a.current { color: var(--text); border-color: var(--border); background: var(--bg); }
      .back-link {
        color: var(--text-mute);
        text-decoration: none;
        font-size: 13px;
        font-weight: 500;
      }
      .back-link:hover { color: var(--acc2); }

      main { padding: 48px 0 80px; }

      h1 {
        font-size: clamp(28px, 4.5vw, 40px);
        font-weight: 900;
        line-height: 1.18;
        letter-spacing: -0.03em;
        margin: 0 0 12px;
        background: linear-gradient(120deg, var(--acc1), var(--acc2));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .lede {
        color: var(--text-soft);
        font-size: 17px;
        margin: 0 0 12px;
      }
      .meta {
        color: var(--text-mute);
        font-size: 13px;
        margin: 0 0 32px;
      }
      h2 {
        font-size: 1.3rem;
        font-weight: 800;
        color: #fff;
        margin: 40px 0 12px;
        letter-spacing: -0.01em;
      }
      h3 {
        font-size: 1.05rem;
        font-weight: 700;
        color: var(--acc1);
        margin: 24px 0 8px;
      }
      p, li {
        color: var(--text-soft);
        font-size: 15px;
      }
      ul, ol { padding-left: 22px; line-height: 1.9; }
      li { margin-bottom: 6px; }
      code {
        background: rgba(139, 92, 246, 0.15);
        color: var(--acc2);
        padding: 2px 6px;
        border-radius: 4px;
        font-family: 'DM Mono', monospace;
        font-size: 0.9em;
      }
      pre {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 16px 18px;
        overflow-x: auto;
        margin: 16px 0;
      }
      pre code {
        background: none;
        padding: 0;
        border-radius: 0;
        font-size: 0.875em;
      }
      a { color: var(--acc2); }
      a:hover { color: var(--acc1); }
      blockquote {
        border-left: 3px solid var(--acc3);
        margin: 20px 0;
        padding: 12px 18px;
        background: var(--bg-card);
        border-radius: 0 8px 8px 0;
      }
      blockquote p { margin: 0; }
      table {
        width: 100%;
        border-collapse: collapse;
        margin: 20px 0;
        font-size: 14px;
      }
      th, td {
        border: 1px solid var(--border);
        padding: 10px 14px;
        text-align: left;
      }
      th {
        background: var(--bg-card);
        color: #fff;
        font-weight: 700;
      }
      td { color: var(--text-soft); }

      .note {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-left: 3px solid var(--acc2);
        border-radius: 8px;
        padding: 14px 18px;
        margin: 20px 0;
      }
      .note p { margin: 0; font-size: 14px; }

      .cta {
        background: linear-gradient(120deg, rgba(192, 132, 252, 0.12), rgba(34, 211, 238, 0.10));
        border: 1px solid var(--acc3);
        border-radius: 14px;
        padding: 24px;
        margin: 32px 0;
        text-align: center;
      }
      .cta-btn {
        display: inline-block;
        background: linear-gradient(120deg, var(--acc1), var(--acc2));
        color: #08080f;
        font-weight: 800;
        text-decoration: none;
        padding: 12px 22px;
        border-radius: 99px;
        margin-top: 6px;
      }

      .internal-links {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 20px 22px;
        margin: 32px 0;
      }
      .internal-links h3 {
        margin: 0 0 12px;
        color: #fff;
        font-size: 1rem;
      }
      .internal-links ul {
        margin: 0;
        padding-left: 20px;
      }

      footer {
        background: var(--bg);
        border-top: 1px solid var(--border);
        padding: 24px 0 40px;
        color: var(--text-mute);
        font-size: 12px;
        text-align: center;
        line-height: 1.9;
      }
      footer a { color: var(--text-mute); margin: 0 8px; }
      footer a:hover { color: var(--acc2); }
    </style>
  </head>
  <body>
    <header>
      <div class="wrap">
        <div class="header-inner">
          <a href="/" class="logo">SunoDown<span class="logo-dot">.</span><span class="pill">FREE</span></a>
          <div class="header-right">
            <a href="{{BACK_URL}}" class="back-link">{{BACK_LABEL}}</a>
            <nav class="lang-switch" aria-label="{{LANG_SWITCH_LABEL}}">
              {{LANG_SWITCH_HTML}}
            </nav>
          </div>
        </div>
      </div>
    </header>

    <main>
      <div class="wrap">
        <article>
          <h1>{{TITLE}}</h1>
          <p class="lede">{{SUMMARY}}</p>
          <p class="meta">{{META_LINE}}</p>

          {{BODY}}

          <div class="cta">
            <p style="margin:0 0 4px;font-size:14px;color:var(--text-soft)">{{CTA_TEXT}}</p>
            <a href="/" class="cta-btn">{{CTA_BTN}}</a>
          </div>

          {{INTERNAL_LINKS_HTML}}
        </article>
      </div>
    </main>

    <footer>
      <div class="wrap">
        <p>
          <a href="/">{{FOOTER_HOME}}</a> ·
          <a href="{{FOOTER_ABOUT_URL}}">{{FOOTER_ABOUT}}</a> ·
          <a href="{{FOOTER_BLOG_URL}}">{{FOOTER_BLOG}}</a> ·
          <a href="{{FOOTER_FAQ_URL}}">FAQ</a> ·
          <a href="{{FOOTER_GUIDE_URL}}">{{FOOTER_GUIDE}}</a> ·
          <a href="/privacy">{{FOOTER_PRIVACY}}</a> ·
          <a href="/terms">{{FOOTER_TERMS}}</a>
        </p>
        <p>{{FOOTER_COPY}}</p>
      </div>
    </footer>
  </body>
</html>
